name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --features gui,portable

      - name: Create NSIS installer script
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          @"
          !include "MUI2.nsh"

          !define MUI_ICON "crates\desktop\assets\app.ico"
          !define MUI_UNICON "crates\desktop\assets\app.ico"

          Name "AutoPipe"
          OutFile "AutoPipe-Setup-${{ github.ref_name }}.exe"
          InstallDir "`$PROGRAMFILES\AutoPipe"
          RequestExecutionLevel admin

          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_LANGUAGE "English"

          Section "Install"
            SetOutPath "`$INSTDIR"
            File "target\release\autopipe.exe"
            File "crates\desktop\assets\app.ico"

            CreateDirectory "`$SMPROGRAMS\AutoPipe"
            CreateShortcut "`$SMPROGRAMS\AutoPipe\AutoPipe.lnk" "`$INSTDIR\autopipe.exe" "" "`$INSTDIR\app.ico"
            CreateShortcut "`$DESKTOP\AutoPipe.lnk" "`$INSTDIR\autopipe.exe" "" "`$INSTDIR\app.ico"

            WriteUninstaller "`$INSTDIR\uninstall.exe"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\AutoPipe" "DisplayName" "AutoPipe"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\AutoPipe" "UninstallString" "`$INSTDIR\uninstall.exe"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\AutoPipe" "DisplayVersion" "$version"
          SectionEnd

          Section "Uninstall"
            Delete "`$INSTDIR\autopipe.exe"
            Delete "`$INSTDIR\app.ico"
            Delete "`$INSTDIR\uninstall.exe"
            RMDir "`$INSTDIR"
            Delete "`$SMPROGRAMS\AutoPipe\AutoPipe.lnk"
            Delete "`$DESKTOP\AutoPipe.lnk"
            RMDir "`$SMPROGRAMS\AutoPipe"
            DeleteRegKey HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\AutoPipe"
          SectionEnd
          "@ | Out-File -Encoding UTF8 installer.nsi

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build NSIS installer
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\NSIS\makensis.exe" installer.nsi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            target/release/autopipe.exe
            AutoPipe-Setup-${{ github.ref_name }}.exe

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            name: autopipe-macos-arm64
          - target: x86_64-apple-darwin
            name: autopipe-macos-x64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --features gui,portable --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/autopipe ${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libssl-dev libxdo-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --features gui,portable

      - name: Rename binary
        run: cp target/release/autopipe autopipe-linux-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: autopipe-linux-x64

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            autopipe.exe
            AutoPipe-Setup-*.exe
            autopipe-macos-arm64
            autopipe-macos-x64
            autopipe-linux-x64
