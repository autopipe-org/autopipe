name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --features gui,portable

      - name: Create NSIS installer script
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          @"
          !include "MUI2.nsh"

          !define MUI_ICON "crates\desktop\assets\app.ico"
          !define MUI_UNICON "crates\desktop\assets\app.ico"

          Name "AutoPipe"
          OutFile "AutoPipe-Setup-${{ github.ref_name }}.exe"
          InstallDir "`$PROGRAMFILES\AutoPipe"
          RequestExecutionLevel admin

          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_LANGUAGE "English"

          Section "Install"
            SetOutPath "`$INSTDIR"
            File "target\release\autopipe.exe"
            File "crates\desktop\assets\app.ico"

            CreateDirectory "`$SMPROGRAMS\AutoPipe"
            CreateShortcut "`$SMPROGRAMS\AutoPipe\AutoPipe.lnk" "`$INSTDIR\autopipe.exe" "" "`$INSTDIR\app.ico"
            CreateShortcut "`$DESKTOP\AutoPipe.lnk" "`$INSTDIR\autopipe.exe" "" "`$INSTDIR\app.ico"

            WriteUninstaller "`$INSTDIR\uninstall.exe"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\AutoPipe" "DisplayName" "AutoPipe"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\AutoPipe" "UninstallString" "`$INSTDIR\uninstall.exe"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\AutoPipe" "DisplayVersion" "$version"
          SectionEnd

          Section "Uninstall"
            Delete "`$INSTDIR\autopipe.exe"
            Delete "`$INSTDIR\app.ico"
            Delete "`$INSTDIR\uninstall.exe"
            RMDir "`$INSTDIR"
            Delete "`$SMPROGRAMS\AutoPipe\AutoPipe.lnk"
            Delete "`$DESKTOP\AutoPipe.lnk"
            RMDir "`$SMPROGRAMS\AutoPipe"
            DeleteRegKey HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\AutoPipe"
          SectionEnd
          "@ | Out-File -Encoding UTF8 installer.nsi

      - name: Install NSIS
        run: choco install nsis -y --force

      - name: Build NSIS installer
        shell: pwsh
        run: |
          $env:PATH += ";${env:ProgramFiles(x86)}\NSIS;${env:ProgramFiles}\NSIS"
          makensis installer.nsi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            target/release/autopipe.exe
            AutoPipe-Setup-${{ github.ref_name }}.exe

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
          - target: x86_64-apple-darwin
            arch: x64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --features gui,portable --target ${{ matrix.target }}

      - name: Create macOS .app bundle
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          APP="AutoPipe.app"

          # Create .app bundle structure
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"
          cp target/${{ matrix.target }}/release/autopipe "$APP/Contents/MacOS/autopipe"
          chmod +x "$APP/Contents/MacOS/autopipe"

          # Generate .icns icon from logo.png
          mkdir -p AppIcon.iconset
          sips -z 16 16     web/static/logo.png --out AppIcon.iconset/icon_16x16.png
          sips -z 32 32     web/static/logo.png --out AppIcon.iconset/icon_16x16@2x.png
          sips -z 32 32     web/static/logo.png --out AppIcon.iconset/icon_32x32.png
          sips -z 64 64     web/static/logo.png --out AppIcon.iconset/icon_32x32@2x.png
          sips -z 128 128   web/static/logo.png --out AppIcon.iconset/icon_128x128.png
          sips -z 256 256   web/static/logo.png --out AppIcon.iconset/icon_128x128@2x.png
          sips -z 256 256   web/static/logo.png --out AppIcon.iconset/icon_256x256.png
          sips -z 512 512   web/static/logo.png --out AppIcon.iconset/icon_256x256@2x.png
          sips -z 512 512   web/static/logo.png --out AppIcon.iconset/icon_512x512.png
          sips -z 1024 1024 web/static/logo.png --out AppIcon.iconset/icon_512x512@2x.png
          iconutil -c icns AppIcon.iconset -o "$APP/Contents/Resources/AppIcon.icns"

          # Create Info.plist
          cat > "$APP/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>AutoPipe</string>
            <key>CFBundleDisplayName</key>
            <string>AutoPipe</string>
            <key>CFBundleIdentifier</key>
            <string>org.autopipe.desktop</string>
            <key>CFBundleVersion</key>
            <string>${VERSION}</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundleExecutable</key>
            <string>autopipe</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>LSMinimumSystemVersion</key>
            <string>11.0</string>
          </dict>
          </plist>
          PLIST

      - name: Create DMG
        run: |
          DMG_NAME="AutoPipe-${{ github.ref_name }}-macos-${{ matrix.arch }}.dmg"
          mkdir -p dmg-content
          ditto AutoPipe.app dmg-content/AutoPipe.app
          ln -s /Applications dmg-content/Applications
          sync
          sleep 5
          # Retry hdiutil up to 3 times (macOS indexing can lock files)
          for i in 1 2 3; do
            hdiutil create -volname "AutoPipe" -srcfolder dmg-content \
              -ov -format UDZO "$DMG_NAME" && break
            echo "hdiutil attempt $i failed, retrying in 5s..."
            sleep 5
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: AutoPipe-${{ github.ref_name }}-macos-${{ matrix.arch }}.dmg

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libssl-dev libxdo-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: linux-22.04

      - name: Build
        run: cargo build --release --features gui,portable

      - name: Rename binary
        run: cp target/release/autopipe autopipe-${{ github.ref_name }}-linux-x64

      - name: Create .deb package
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          mkdir -p pkg/DEBIAN
          mkdir -p pkg/usr/bin
          mkdir -p pkg/usr/share/applications
          mkdir -p pkg/usr/share/icons/hicolor/256x256/apps

          cp target/release/autopipe pkg/usr/bin/
          chmod +x pkg/usr/bin/autopipe
          cp web/static/logo.png pkg/usr/share/icons/hicolor/256x256/apps/autopipe.png

          cat > pkg/DEBIAN/control << EOF
          Package: autopipe
          Version: ${VERSION}
          Architecture: amd64
          Maintainer: AutoPipe Team <contact@autopipe.org>
          Description: Bioinformatics pipeline management tool
           MCP server for bioinformatics pipeline management.
           Compatible with Claude Desktop and any MCP-compatible app.
          Depends: libgtk-3-0, libssl3, libxdo3
          EOF

          cat > pkg/usr/share/applications/autopipe.desktop << EOF
          [Desktop Entry]
          Name=AutoPipe
          Exec=/usr/bin/autopipe
          Icon=autopipe
          Type=Application
          Categories=Science;Education;
          Comment=Bioinformatics pipeline management tool
          EOF

          dpkg-deb --build pkg autopipe_${VERSION}_amd64.deb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            autopipe-${{ github.ref_name }}-linux-x64
            autopipe_*_amd64.deb

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            autopipe.exe
            AutoPipe-Setup-*.exe
            AutoPipe-*-macos-arm64.dmg
            AutoPipe-*-macos-x64.dmg
            autopipe-*-linux-x64
            autopipe_*_amd64.deb
